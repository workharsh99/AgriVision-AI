version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: agrivision-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - agrivision-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: agrivision-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/agrivision
      - JWT_SECRET=${JWT_SECRET:-agrivisionsecretkey}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - agrivision-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api}
    container_name: agrivision-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - agrivision-network

volumes:
  mongo-data:

networks:
  agrivision-network:
    driver: bridge
